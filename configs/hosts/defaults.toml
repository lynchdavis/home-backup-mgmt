# Tourbillon defaults for host backups.
# See doc/ADR-002-host-backups-linux.md (multi-user shape)
#     doc/ADR-003-host-backups-single-user-mode.md (single-user variant).
#
# This file is declarative: every settable field appears with its default
# value and a one-line comment. Per-host files in configs/hosts/<host>.toml
# override individual fields. Editing per-host fields here changes the
# default; per-host wins on a field-by-field basis.


# ──────────────────────────────────────────────────────────────────────
# Authentication
# ──────────────────────────────────────────────────────────────────────

# SSH user on the target host.
#   multi-user linux  : "tourbillon"  (dedicated service account)
#   single-user mac   : the operator's existing user (e.g. "lynch")
#   single-user win   : the operator's existing user (whatever Windows username)
ssh_user = "tourbillon"

# Path to the per-host SSH private key on kodiak. {host} is substituted
# with the per-host config's basename at runtime. Override per-host only
# if a non-default path is wanted.
ssh_key = "~/.ssh/id_ed25519_tourbillon_{host}"

# Whether target-side rsync must be wrapped in sudo to read the configured
# paths.
#   true  : multi-user host. rsync runs as the `tourbillon` service account
#           and needs `sudo /usr/bin/rsync --server *` (the sudoers entry
#           bootstrap-tourbillon-user.sh installs).
#   false : single-user host. rsync runs as the operator's own user with
#           direct read access to their own home — no sudo wrapper.
sudo_required = true


# ──────────────────────────────────────────────────────────────────────
# Source (the target host)
# ──────────────────────────────────────────────────────────────────────

# Default paths to back up. Almost always per-host overridden:
#   multi-user linux  : ["/home"]  (default) or ["/home", "/etc"]
#   single-user mac   : ["/Users/<user>"]
#   single-user win   : ["/cygdrive/c/Users/<user>"]   (cwRsync)
#                       or ["/mnt/c/Users/<user>"]      (WSL rsync)
paths = ["/home"]

# rsync --exclude-from path, relative to the repo root. Pick by platform:
#   linux-user.txt    : multi-user linux (default)
#   mac-user.txt      : macOS single-user
#   windows-user.txt  : Windows single-user (when one onboards)
excludes_file = "configs/hosts/excludes/linux-user.txt"

# Target-side rsync binary path. Default empty = PATH-resolved on target
# (works on Linux: rsync is at /usr/bin/rsync and first in PATH).
# Override per-host when the target needs a non-default rsync:
#   macOS:  "/opt/homebrew/bin/rsync"  (Apple Silicon brew rsync — needed
#           because /usr/bin/rsync on macOS is `openrsync`, an Apple fork
#           incompatible with GNU rsync's --server protocol)
#   Win:    "/cygdrive/c/Program Files/cwRsync/bin/rsync"  (typical cwRsync)
#
# When sudo_required=true, this is wrapped: "sudo <rsync_path>".
# When sudo_required=false, it's passed as-is. Empty + sudo_required=true
# falls back to /usr/bin/rsync for backwards compatibility.
rsync_path = ""

# rsync archive flags. Default -avHAX preserves ACLs (-A) and xattrs (-X)
# which works fine on Linux. macOS uses NFSv4-style ACLs that GNU rsync
# can't represent, so mac hosts should drop -A.
rsync_archive_flags = "-avHAX"


# ──────────────────────────────────────────────────────────────────────
# Schedule + reachability
# ──────────────────────────────────────────────────────────────────────

# Cadence — "try every N, never error if the host is offline."
# Cron fires the outer loop every 30 min; this is each host's interval
# threshold for "would I do work?"
schedule_when_up = "24h"

# SSH probe timeout (seconds) for the "is this host up?" check before each
# sync attempt. Short to fail-fast on offline hosts.
ssh_probe_timeout = "5s"


# ──────────────────────────────────────────────────────────────────────
# Destination (kodiak side)
# ──────────────────────────────────────────────────────────────────────

# ZFS parent dataset for host mirrors. Each host's first sync auto-creates
# a child dataset here (e.g. backups-00/hosts/arrow-iii) so per-host
# snapshot retention is independent.
target_dataset = "backups-00/hosts"
