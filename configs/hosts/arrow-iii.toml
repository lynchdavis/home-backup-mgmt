# arrow-iii — minimal-use linux host on the LAN.
#
# Bootstrap (one-time per host):
#   1. On the TARGET, as root:  sudo bash bin/bootstrap-tourbillon-user.sh
#      This creates the `tourbillon` user, generates a temp random
#      password, and drops the narrow sudoers entry. The password is
#      printed at the end.
#   2. On KODIAK:                bin/bootstrap-from-kodiak.sh arrow-iii
#      This generates a per-host keypair at
#      ~/.ssh/id_ed25519_tourbillon_arrow-iii, ssh-copy-id pushes the
#      pubkey to the target (operator pastes the temp password once),
#      verifies key-based auth, and locks the target's tourbillon
#      password so only key-auth works thereafter.

host = "192.168.1.65"

# Mirror /home + /etc — minimal-use machine, /etc has some hand-curated drift
# worth keeping; everything else is rebuildable from a fresh install.
paths = ["/home", "/etc"]

# schedule_when_up, ssh_user, target_dataset, excludes_file inherited from
# configs/hosts/defaults.toml. ssh_key derived by tourbillon as
# ~/.ssh/id_ed25519_tourbillon_arrow-iii (no field needed here).
