###############################################################################
# Sanoid configuration for kodiak's backups-00 ZFS pool.
#
# Managed snapshot retention for the tourbillon-side datasets:
#   - backups-00/repos        (repo mirrors; one dataset, not recursive)
#   - backups-00/hosts        (host backups; recursive — one child per host)
#
# NOT managed here:
#   - backups-00/saratoga/*   — retention controlled by the TrueNAS
#                               replication tasks (retention_policy=SOURCE,
#                               see ADR/PLAYBOOK). Sanoid here would conflict.
#   - backups-00 (pool root)  — no data of its own.
###############################################################################

[backups-00/repos]
    use_template = repos
    recursive = no

[backups-00/hosts]
    # Recursive = yes so each per-host child dataset (arrow-iii, future
    # mac/win/etc.) gets its own snapshot timeline. New children added
    # at first-seed time are picked up automatically on the next sanoid tick.
    use_template = host-mirrors
    recursive = yes

#############################
# Templates
#############################

[template_repos]
    # Repos churn slowly; 30 days of daily snapshots is plenty for
    # "I rolled out something bad" recovery. Hourly/monthly disabled.
    frequently = 0
    hourly = 0
    daily = 30
    monthly = 0
    yearly = 0
    autosnap = yes
    autoprune = yes

[template_host-mirrors]
    # Host /home + /etc mirrors. 30 days of daily snapshots covers the
    # accidental-delete recovery window (including Trash, which we
    # include per safety-nets-for-scratch). Same shape as repos.
    frequently = 0
    hourly = 0
    daily = 30
    monthly = 0
    yearly = 0
    autosnap = yes
    autoprune = yes
