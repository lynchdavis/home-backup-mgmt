###############################################################################
# Sanoid configuration for kodiak's backups-00 ZFS pool.
#
# Managed snapshot retention for backups-00/repos (the tourbillon
# repo-mirror dataset). Other backups-00 children are NOT managed here:
#   - backups-00/saratoga/* — snapshot retention is controlled by the
#     TrueNAS replication tasks (retention_policy=SOURCE, see ADR/PLAYBOOK).
#     Sanoid here would conflict.
#   - backups-00 (pool root) — no data of its own.
###############################################################################

[backups-00/repos]
    use_template = repos
    recursive = no

#############################
# Templates
#############################

[template_repos]
    # Repos churn slowly; 30 days of daily snapshots is plenty for
    # "I rolled out something bad" recovery. Hourly/monthly disabled.
    frequently = 0
    hourly = 0
    daily = 30
    monthly = 0
    yearly = 0
    autosnap = yes
    autoprune = yes
